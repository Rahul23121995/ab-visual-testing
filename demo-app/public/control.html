<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Norwegian Flight Search (Control)</title>
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body class="flight-portal-theme">
  <div class="header-nav">
    <div class="logo">
      <span class="red-brand">norwegian</span><span class="dot-brand">.no</span>
    </div>
    <div class="nav-links">
      <span class="nav-item active">Bestill</span>
      <span class="nav-item">Mine reiser</span>
      <span class="nav-item">Hjelp</span>
    </div>
  </div>

  <div class="container">
    <div class="search-card control-style">
      <div class="search-header">
        <h1>Finn og bestill flyreiser</h1>
        <p>Utforsk destinasjoner og bestill din neste reise</p>
      </div>

      <div class="trip-type-selector">
        <button class="trip-type-btn active">Tur/retur</button>
        <button class="trip-type-btn">En vei</button>
        <button class="trip-type-btn">Flere byer</button>
      </div>

      <div class="search-widget">
        <!-- Origin -->
        <div class="input-field">
          <label for="origin-input-placeholder">Fra</label>
          <div class="input-wrapper">
            <span class="input-icon">🛫</span>
            <input type="text" id="origin-input-placeholder" value="Oslo (OSL)" placeholder="Flyplass eller by..." />
          </div>
        </div>

        <!-- Destination -->
        <div class="input-field">
          <label for="destination-input-placeholder">Til</label>
          <div class="input-wrapper">
            <span class="input-icon">🛬</span>
            <input type="text" id="destination-input-placeholder" placeholder="Velg destinasjon..." />
          </div>
        </div>

        <!-- Dates -->
        <div class="input-field double">
          <div>
            <label>Utreise</label>
            <div class="input-wrapper">
              <span class="input-icon">📅</span>
              <input type="text" value="28. Jun 2026" readonly />
            </div>
          </div>
          <div>
            <label>Hjemreise</label>
            <div class="input-wrapper">
              <span class="input-icon">📅</span>
              <input type="text" value="05. Jul 2026" readonly />
            </div>
          </div>
        </div>

        <!-- Passengers -->
        <div class="input-field">
          <label>Reisende</label>
          <div class="input-wrapper">
            <span class="input-icon">👤</span>
            <input type="text" value="1 voksen, økonomi" readonly />
          </div>
        </div>

        <!-- Search button container -->
        <div class="cta-button-container">
          <button class="cta-button">Søk og bestill</button>
        </div>
      </div>

      <div class="footer-text">
        Variant: CONTROL • Offisiell søkekanal
      </div>
    </div>
  </div>

  <script src="tracking.js"></script>
</body>
</html>
