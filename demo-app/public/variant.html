<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SaaS Premium Checkout (Variant)</title>
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="container">
    <div class="checkout-card variant-theme">
      <div class="header">
        <h1>Growth Premium</h1>
        <p>Upgrade your team's optimization tools today</p>
      </div>

      <div class="product-info">
        <div class="product-name">
          <h3>Growth Plan</h3>
          <p>Unlimited automation, statistical engines, visual diffs</p>
        </div>
        <div class="product-price">$39/mo</div>
      </div>

      <div class="features-list">
        <div class="feature-item">
          <div class="feature-icon">✓</div>
          <span>Percy-style visual comparison</span>
        </div>
        <div class="feature-item">
          <div class="feature-icon">✓</div>
          <span>Automatic event and goal validation</span>
        </div>
        <div class="feature-item">
          <div class="feature-icon">✓</div>
          <span>Z-test proportions statistical engine</span>
        </div>
      </div>

      <div class="input-group" style="margin-bottom: 1.5rem; display: flex; flex-direction: column; gap: 0.5rem; text-align: left;">
        <label for="username-input-placeholder" style="font-size: 0.85rem; color: var(--text-secondary);">Username</label>
        <input type="text" id="username-input-placeholder" placeholder="Enter username..." style="padding: 0.75rem; border-radius: 0.5rem; border: 1px solid var(--border-color); background: #0f172a; color: var(--text-primary); outline: none;" />
        <label for="password-input-placeholder" style="font-size: 0.85rem; color: var(--text-secondary); margin-top: 0.5rem;">Password</label>
        <input type="password" id="password-input-placeholder" placeholder="Enter password..." style="padding: 0.75rem; border-radius: 0.5rem; border: 1px solid var(--border-color); background: #0f172a; color: var(--text-primary); outline: none;" />
      </div>

      <div class="cta-button-container">
        <button class="cta-button">Subscribe to Growth Plan →</button>
      </div>

      <div class="footer-text">
        Variant: VARIANT A • Secured Checkout
      </div>
    </div>
  </div>
  
  <script src="tracking.js"></script>
</body>
</html>
